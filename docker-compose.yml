services:
  bgm-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: bgm-web
    restart: unless-stopped

    environment:
      NODE_ENV: production
      TZ: Asia/Seoul

      DATABASE_URL: ${BGM_DATABASE_URL}

      AUTH_SECRET: ${BGM_AUTH_SECRET}
      AUTH_URL: ${BGM_AUTH_URL}
      AUTH_TRUST_HOST: ${BGM_AUTH_TRUST_HOST}

      AUTH_GOOGLE_ID: ${BGM_AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${BGM_AUTH_GOOGLE_SECRET}

      AUTH_KAKAO_ID: ${BGM_AUTH_KAKAO_ID}
      AUTH_KAKAO_SECRET: ${BGM_AUTH_KAKAO_SECRET}

      R2_ACCOUNT_ID: ${BGM_R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${BGM_R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${BGM_R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${BGM_R2_BUCKET_NAME}
      R2_PUBLIC_BASE_URL: ${BGM_R2_PUBLIC_BASE_URL}

      NEXT_PUBLIC_SITE_URL: ${BGM_NEXT_PUBLIC_SITE_URL}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "${BGM_PORT}:3000"